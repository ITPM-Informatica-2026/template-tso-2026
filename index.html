<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSO - ITPM 2026</title>
    <style>
        body { background-color: #1e1e1e; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 40px; }
        .terminal { border: 1px solid #333; padding: 20px; background: #000; border-radius: 5px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .cursor { display: inline-block; width: 10px; height: 18px; background: #00ff00; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
        h1 { font-size: 1.2rem; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>> TALLER DE SISTEMAS OPERATIVOS v2026.0</h1>
        <p>USUARIO_ACTUAL: [ESCRIBE TU NOMBRE]</p>
        <p>SISTEMA: ITPM - PUERTO DE MEJILLONES</p>
        <p>ESTADO: ENTORNO CONFIGURADO CORRECTAMENTE...</p>
        <p>> Cargando módulos de Linux y Windows... [OK]</p>
        <p>> Iniciando contenedores Docker... [OK]</p>
        <p>> <span class="cursor"></span></p>
    </div>
</body>
</html>
